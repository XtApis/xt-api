        - name: stopDelegatePrice
          in: query
          description: 止损委托价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: stopDelegateTimeInForce
          in: query
          description: 止损委托有效方式：1 GTC、2 FOK、3 IOC 4 GTX
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
