  /v1/entrust/create-plan:
    post:
      tags:
        - Conditional orders & TP/SL
      summary: Create Conditional order
      operationId: createPlanEntrustUsingPOST
      parameters:
        - name: clientMedia
          in: query
          description: Client media
          required: false
          style: form
          schema:
            type: string
        - name: clientMediaChannel
          in: query
          description: Client media channel
          required: false
          style: form
          schema:
            type: string
        - name: clientOrderId
          in: query
          description: Client ID
          required: false
          style: form
          schema:
            type: string
        - name: delegateTriggerPriceType
          in: query
          description: "TP/SL trigger price type: INDEX_PRICE(Index price); MARK_PRICE(Mark price); LATEST_PRICE(Last price)"
          required: false
          style: form
          schema:
            type: string
            enum:
              - INDEX_PRICE
              - LATEST_PRICE
              - MARK_PRICE
        - name: entrustType
          in: query
          description: >-
            OrderType: TAKE_PROFIT(Take-profitLimit order); STOP(Stop-lossLimit order); TAKE_PROFIT_MARKET(Take-profitMarket order); STOP_MARKET (Stop-lossMarket order); TRAILING_STOP_MARKET (Tracking stop-loss order)
          required: true
          style: form
          schema:
            type: string
            enum:
              - PLAN_REVERSE_ENTRUST
              - STOP
              - STOP_MARKET
              - TAKE_PROFIT
              - TAKE_PROFIT_MARKET
              - TRAILING_STOP_MARKET
        - name: expireTime
          in: query
          description: Expiration time
          required: false
          style: form
          schema:
            type: integer
            format: int64
        - name: marketOrderLevel
          in: query
          description: "Best market level: 1: Counterparty price; Current price; 5, 10, 15 levels"
          required: false
          style: form
          schema:
            type: integer
            format: int32
        - name: orderSide
          in: query
          description: "Order side: BUY;SELL"
          required: true
          style: form
          schema:
            type: string
            enum:
              - BUY
              - SELL
        - name: origQty
          in: query
          description: Quantity(contracts)
          required: true
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: positionSide
          in: query
          description: "Position side: LONG;SHORT"
          required: true
          style: form
          schema:
            type: string
            enum:
              - BOTH
              - LONG
              - SHORT
        - name: positionType
          in: query
          description: "Position mode: crossedCross (CROSSED)、isolatedIsolated (ISOLATED)"
          required: false
          style: form
          schema:
            type: string
            enum:
              - CROSSED
              - ISOLATED
        - name: price
          in: query
          description: Price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: profitDelegateOrderType
          in: query
          description: 'TP order type :1Limit、2Market'
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: profitDelegatePrice
          in: query
          description: TP price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: profitDelegateTimeInForce
          in: query
          description: "TP time-in-force: 1 GTC、2 FOK、3 IOC 4 GTX"
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: sourceType
          in: query
          description: SourceType, ENTRUST
          required: false
          style: form
          schema:
            type: string
            enum:
              - ADL
              - COPY_TRADE_FOLLOWER
              - COPY_TRADE_LEADER
              - COPY_TRADE_LEADER_REVERSE
              - COPY_TRADE_LEADER_REVERSE_OPEN
              - DEFAULT
              - ENTRUST
              - FLASH_CLOSING
              - GRID
              - GRID_CLOSE
              - MATCHER
              - MMR_PROFIT
              - PROFIT
              - REVERSE
              - REVERSE_PLAN
              - SELF_CLOSING
              - STRATEGY
              - TRACK_ENTRUST
              - TRADE_SIGNAL_ORDER
        - name: stopDelegateOrderType
          in: query
          description: 'SL order type :1Limit、2Market'
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: stopDelegatePrice
          in: query
          description: SL price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: stopDelegateTimeInForce
          in: query
          description: "SL time-in-force: 1 GTC、2 FOK、3 IOC 4 GTX"
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: stopPrice
          in: query
          description: Trigger price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: symbol
          in: query
          description: Trading pair
          required: true
          style: form
          schema:
            type: string
        - name: timeInForce
          in: query
          description: "Time in force: GTC;IOC;FOK;GTX"
          required: true
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: triggerPriceType
          in: query
          description: "Trigger price type: INDEX_PRICE(Index price); MARK_PRICE(Mark price); LATEST_PRICE(Last price)"
          required: true
          style: form
          schema:
            type: string
            enum:
              - INDEX_PRICE
              - LATEST_PRICE
              - MARK_PRICE
        - name: triggerProfitPrice
          in: query
          description: Take-profit trigger price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: triggerStopPrice
          in: query
          description: Stop-loss trigger price
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CommonResponse«object»'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
