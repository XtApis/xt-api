  /v1/entrust/create-mmr-profit:
    post:
      tags:
        - 计划委托与止盈止损
      summary: 创建mmr止损
      operationId: createMMRProfitEntrustUsingPOST
      parameters:
        - name: clientMedia
          in: query
          description: 客户端媒体
          required: false
          style: form
          schema:
            type: string
        - name: clientMediaChannel
          in: query
          description: 客户端媒体渠道
          required: false
          style: form
          schema:
            type: string
        - name: clientOrderId
          in: query
          description: 客户端ID
          required: false
          style: form
          schema:
            type: string
        - name: mmrThreshold
          in: query
          description: mmr止损值
          required: true
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: positionSide
          in: query
          description: 持仓方向：LONG;SHORT
          required: true
          style: form
          schema:
            type: string
            enum:
              - BOTH
              - LONG
              - SHORT
        - name: symbol
          in: query
          description: 交易对
          required: true
          style: form
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CommonResponse«object»'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /v1/entrust/create-plan:
    post:
      tags:
        - 计划委托与止盈止损
      summary: 创建计划委托
      operationId: createPlanEntrustUsingPOST
      parameters:
        - name: clientMedia
          in: query
          description: 客户端媒体
          required: false
          style: form
          schema:
            type: string
        - name: clientMediaChannel
          in: query
          description: 客户端媒体渠道
          required: false
          style: form
          schema:
            type: string
        - name: clientOrderId
          in: query
          description: 客户端ID
          required: false
          style: form
          schema:
            type: string
        - name: delegateTriggerPriceType
          in: query
          description: 止盈止损触发价格类型：INDEX_PRICE(指数价格); MARK_PRICE(标记价格)；LATEST_PRICE(最新价格)
          required: false
          style: form
          schema:
            type: string
            enum:
              - INDEX_PRICE
              - LATEST_PRICE
              - MARK_PRICE
        - name: entrustType
          in: query
          description: >-
            委托类型：TAKE_PROFIT(止盈限价单)；STOP(止损限价单)；TAKE_PROFIT_MARKET（止盈市价单）；STOP_MARKET（止损市价单）；TRAILING_STOP_MARKET（跟踪止损单）
          required: true
          style: form
          schema:
            type: string
            enum:
              - PLAN_REVERSE_ENTRUST
              - STOP
              - STOP_MARKET
              - TAKE_PROFIT
              - TAKE_PROFIT_MARKET
              - TRAILING_STOP_MARKET
        - name: expireTime
          in: query
          description: 过期时间
          required: false
          style: form
          schema:
            type: integer
            format: int64
        - name: marketOrderLevel
          in: query
          description: 市价最优档：1：对手价；当前价；5，10，15挡
          required: false
          style: form
          schema:
            type: integer
            format: int32
        - name: orderSide
          in: query
          description: 订单方向：BUY;SELL
          required: true
          style: form
          schema:
            type: string
            enum:
              - BUY
              - SELL
        - name: origQty
          in: query
          description: 数量（张）
          required: true
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: positionSide
          in: query
          description: 持仓方向：LONG;SHORT
          required: true
          style: form
          schema:
            type: string
            enum:
              - BOTH
              - LONG
              - SHORT
        - name: positionType
          in: query
          description: 仓位模式：crossed全仓、isolated逐仓
          required: false
          style: form
          schema:
            type: string
            enum:
              - CROSSED
              - ISOLATED
        - name: price
          in: query
          description: 价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: profitDelegateOrderType
          in: query
          description: '止盈委托订单类型:1限价、2市价'
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: profitDelegatePrice
          in: query
          description: 止盈委托委托价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: profitDelegateTimeInForce
          in: query
          description: 止盈委托有效方式：1 GTC、2 FOK、3 IOC 4 GTX
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: sourceType
          in: query
          description: 来源类型，ENTRUST
          required: false
          style: form
          schema:
            type: string
            enum:
              - ADL
              - COPY_TRADE_FOLLOWER
              - COPY_TRADE_LEADER
              - COPY_TRADE_LEADER_REVERSE
              - COPY_TRADE_LEADER_REVERSE_OPEN
              - DEFAULT
              - ENTRUST
              - FLASH_CLOSING
              - GRID
              - GRID_CLOSE
              - MATCHER
              - MMR_PROFIT
              - PROFIT
              - REVERSE
              - REVERSE_PLAN
              - SELF_CLOSING
              - STRATEGY
              - TRACK_ENTRUST
              - TRADE_SIGNAL_ORDER
        - name: stopDelegateOrderType
          in: query
          description: '止损委托订单类型:1限价、2市价'
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: stopDelegatePrice
          in: query
          description: 止损委托价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: stopDelegateTimeInForce
          in: query
          description: 止损委托有效方式：1 GTC、2 FOK、3 IOC 4 GTX
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: stopPrice
          in: query
          description: 触发价
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: symbol
          in: query
          description: 交易对
          required: true
          style: form
          schema:
            type: string
        - name: timeInForce
          in: query
          description: 有效方式：GTC;IOC;FOK;GTX
          required: true
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: triggerPriceType
          in: query
          description: 触发价格类型：INDEX_PRICE(指数价格); MARK_PRICE(标记价格)；LATEST_PRICE(最新价格)
          required: true
          style: form
          schema:
            type: string
            enum:
              - INDEX_PRICE
              - LATEST_PRICE
              - MARK_PRICE
        - name: triggerProfitPrice
          in: query
          description: 止盈触发价
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: triggerStopPrice
          in: query
          description: 止损触发价
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CommonResponse«object»'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
