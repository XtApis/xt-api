            enum:
              - BOTH
              - LONG
              - SHORT
        - name: profitDelegateOrderType
          in: query
          description: 订单类型：LIMIT 限价；MARKET 市价
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: profitDelegatePrice
          in: query
          description: 止盈委托委托价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: profitDelegateTimeInForce
          in: query
          description: 止盈委托有效方式：1 GTC、2 FOK、3 IOC 4 GTX
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: stopDelegateOrderType
          in: query
          description: '止损委托订单类型:1限价、2市价'
          required: false
          style: form
          schema:
            type: string
            enum:
              - LIMIT
              - MARKET
        - name: stopDelegatePrice
          in: query
          description: 止损委托价格
          required: false
          style: form
          schema:
            type: number
            format: bigdecimal
        - name: stopDelegateTimeInForce
          in: query
          description: 止损委托有效方式：1 GTC、2 FOK、3 IOC 4 GTX
          required: false
          style: form
          schema:
            type: string
            enum:
              - FOK
              - GTC
              - GTX
              - IOC
        - name: symbol
          in: query
          description: 交易对
          required: true
          style: form
          schema:
            type: string
        - name: trackNo
          in: query
          description: 'trackNo: 交易员带单特有单号，订单有则传'
          required: false
          style: form
          schema:
            type: integer
            format: int64
        - name: triggerPriceType
          in: query
          description: 触发价格类型：INDEX_PRICE(指数价格); MARK_PRICE(标记价格)；LATEST_PRICE(最新价格)
