  /v1/entrust/cancel-all-profit-stop:
    post:
      tags:
        - 计划委托与止盈止损
      summary: 撤销所有止盈止损
      operationId: cancelAllProfitEntrustUsingPOST
      parameters:
        - name: closeType
          in: query
          description: 止盈止损平仓类型（不传时撤销所有类型）
          required: false
          style: form
          allowReserved: true
          schema:
            type: string
        - name: positionSide
          in: query
          description: 仓位方向（不传时撤销所有方向）
          required: false
          style: form
          allowReserved: true
          schema:
            type: string
        - name: positionType
          in: query
          description: 仓位类型（不传时撤销所有仓位类型）
          required: false
          style: form
          allowReserved: true
          schema:
            type: string
        - name: profitType
          in: query
          description: 止盈止损类型，不传默认普通止盈止损
          required: false
          style: form
          allowReserved: true
          schema:
            type: string
        - name: symbol
          in: query
          description: 交易对（不传时撤销所有交易对）
          required: false
          style: form
          allowReserved: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CommonResponse«boolean»'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
